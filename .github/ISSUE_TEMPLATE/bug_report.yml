name: Bug report
description: Report a problem with the template
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Steps to reproduce and what you expected.
    validations:
      required: true
  - type: input
    id: expo-sdk
    attributes:
      label: Expo SDK version
      placeholder: e.g. 54
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - iOS
        - Android
        - Web
        - All
